services:
  app:
    build: .
    ports:
      - "8001:8000"
    environment:
      - APP_ENV=development
      # Tell the app where Redis lives — using the service name as hostname
      - REDIS_HOST=redis
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
