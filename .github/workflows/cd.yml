
name: CD

on:
  push:
    branches: [ main ]      # on every push to main

jobs:
  deploy:
    # Spin up a fresh Ubuntu Linux VM for this job
    runs-on: ubuntu-latest

    # 🌟 Added PostgreSQL service container to match the CI environment
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      # Install uv on the VM
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # Install Python via uv
      - name: Set up Python
        run: uv python install 3.14

      # Install all dependencies from uv.lock — exact versions, reproducible
      - name: Install dependencies
        run: uv sync

      - name: Run tests
        env: 
          APP_ENV: staging
          # 🌟 Added matching environment configurations so the test runner can locate the service
          DB_USER: test_user
          DB_PASSWORD: test_password
          DB_NAME: test_db
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
        run: uv run pytest -v

      # This step only runs if all previous steps passed.
      # It also only runs on pushes to main — not on pull requests.
      # On a pull request, GITHUB_REF is the PR branch, not refs/heads/main.
      - name: Trigger Coolify deploy
        if: success() && github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          WEBHOOK_SECRET: ${{ secrets.COOLIFY_WEBHOOK_SECRET }}
          WEBHOOK_URL: ${{  secrets.COOLIFY_WEBHOOK_URL  }}
        run: |
          PAYLOAD=$(cat <<'EOF'
          {
          "ref": "refs/heads/${{ github.ref_name }}",
          "repository": { "full_name": "${{ github.repository }}" },
          "commits": [{ "added": [], "removed": [], "modified": ["trigger"] }]
          }
          EOF
          )
          SIG=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | sed 's/.*= //')
          curl -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -H "X-Hub-Signature-256: sha256=$SIG" \
            -d "$PAYLOAD"
