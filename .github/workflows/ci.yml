
on:
  push:
    branches: [ main ]      # on every push to main
  pull_request:
    branches: [ main ]      # on every pull request targeting main

jobs:
  test:
    # Spin up a fresh Ubuntu Linux VM for this job
    runs-on: ubuntu-latest

    steps:
      # Download your repository code onto the VM
      - name: Check out code
        uses: actions/checkout@v4

      # Install uv on the VM
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # Install Python via uv
      - name: Set up Python
        run: uv python install 3.11

      # Install all dependencies from uv.lock — exact versions, reproducible
      - name: Install dependencies
        run: uv sync

      # Check code for style and quality issues
      - name: Run flake8
        run: uv run flake8 . --exclude=.venv

      # Run the tests
      - name: Run tests
        run: uv run pytest -v
        env:
          APP_ENV: test

        
